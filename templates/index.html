<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>كاشف الرسائل المزعجة</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0f0f1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* Animated background blobs */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: drift 8s ease-in-out infinite alternate;
    }
    .blob-1 { width: 400px; height: 400px; background: #6c3de0; top: -100px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 350px; height: 350px; background: #e040c8; bottom: -80px; right: -80px; animation-delay: 2s; }
    .blob-3 { width: 250px; height: 250px; background: #40b8e0; top: 40%; left: 60%; animation-delay: 4s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 40px) scale(1.1); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      animation: slideUp 0.6s cubic-bezier(0.23,1,0.32,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon {
      font-size: 48px;
      text-align: center;
      margin-bottom: 12px;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.45);
      font-size: 0.88rem;
      margin-bottom: 32px;
    }

    /* Textarea */
    .input-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 16px;
      color: #fff;
      font-size: 0.95rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      font-family: inherit;
      direction: ltr;
      text-align: left;
    }

    textarea::placeholder { color: rgba(255,255,255,0.3); }

    textarea:focus {
      border-color: #a56eff;
      box-shadow: 0 0 0 3px rgba(165,110,255,0.2);
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #7c3aed, #c026d3);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.5px;
    }

    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(124,58,237,0.5); }
    .btn:active { transform: translateY(0); }

    .btn .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: scale(0);
      animation: rippleAnim 0.6s linear;
      pointer-events: none;
    }
    @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

    /* Spinner inside button */
    .btn .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn.loading .btn-text { display: none; }
    .btn.loading .spinner { display: block; }

    /* Result */
    .result {
      margin-top: 24px;
      border-radius: 16px;
      padding: 22px 24px;
      display: none;
      animation: fadeIn 0.5s ease both;
      position: relative;
      overflow: hidden;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    .result.spam {
      background: rgba(239,68,68,0.12);
      border: 1.5px solid rgba(239,68,68,0.4);
    }
    .result.ham {
      background: rgba(34,197,94,0.12);
      border: 1.5px solid rgba(34,197,94,0.4);
    }

    .result-icon { font-size: 36px; text-align: center; margin-bottom: 8px; }

    .result-label {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .result.spam .result-label { color: #f87171; }
    .result.ham  .result-label { color: #4ade80; }

    .result-desc {
      text-align: center;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.55);
      margin-bottom: 14px;
    }

    /* Probability bar */
    .bar-wrap {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      height: 8px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 20px;
      width: 0%;
      transition: width 1s cubic-bezier(0.23,1,0.32,1);
    }
    .result.spam .bar-fill { background: linear-gradient(90deg, #f87171, #ef4444); }
    .result.ham  .bar-fill { background: linear-gradient(90deg, #4ade80, #22c55e); }

    .bar-label {
      text-align: center;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.4);
      margin-top: 6px;
    }

    /* Error */
    .error-msg {
      display: none;
      margin-top: 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #f87171;
      font-size: 0.85rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="card">
    <div class="icon">🛡️</div>
    <h1>كاشف الرسائل المزعجة</h1>
    <p class="subtitle">Spam Message Detector — powered by Neural Network</p>

    <div class="input-wrap">
      <textarea id="msgInput" placeholder="اكتب الرسالة هنا... / Enter your message here..."></textarea>
    </div>

    <button class="btn" id="checkBtn" onclick="checkMessage()">
      <span class="btn-text">🔍 فحص الرسالة</span>
      <div class="spinner"></div>
    </button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="result" id="result">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-label" id="resultLabel"></div>
      <div class="result-desc" id="resultDesc"></div>
      <div class="bar-wrap">
        <div class="bar-fill" id="barFill"></div>
      </div>
      <div class="bar-label" id="barLabel"></div>
    </div>
  </div>

  <script>
    // Ripple effect
    document.getElementById('checkBtn').addEventListener('click', function(e) {
      const btn = this;
      const circle = document.createElement('span');
      const diameter = Math.max(btn.clientWidth, btn.clientHeight);
      const radius = diameter / 2;
      const rect = btn.getBoundingClientRect();
      circle.style.cssText = `
        width:${diameter}px; height:${diameter}px;
        left:${e.clientX - rect.left - radius}px;
        top:${e.clientY - rect.top - radius}px;
      `;
      circle.classList.add('ripple');
      btn.querySelector('.ripple')?.remove();
      btn.appendChild(circle);
    });

    async function checkMessage() {
      const input = document.getElementById('msgInput').value.trim();
      const btn = document.getElementById('checkBtn');
      const errorMsg = document.getElementById('errorMsg');
      const resultDiv = document.getElementById('result');

      // Reset
      errorMsg.style.display = 'none';
      resultDiv.style.display = 'none';

      if (!input) {
        showError('⚠️ الرجاء إدخال رسالة أولاً');
        return;
      }

      // Loading state
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: input })
        });

        if (!res.ok) throw new Error('فشل الاتصال بالخادم');

        const data = await res.json();
        showResult(data);

      } catch (err) {
        showError('❌ تعذّر الاتصال بالخادم. تأكد من تشغيل الـ API.');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    function showResult(data) {
      const isSpam = data.prediction === 'Spam';
      const prob = Math.round(data.probability * 100);

      const resultDiv  = document.getElementById('result');
      const icon       = document.getElementById('resultIcon');
      const label      = document.getElementById('resultLabel');
      const desc       = document.getElementById('resultDesc');
      const barFill    = document.getElementById('barFill');
      const barLabel   = document.getElementById('barLabel');

      resultDiv.className = 'result ' + (isSpam ? 'spam' : 'ham');
      icon.textContent  = isSpam ? '🚨' : '✅';
      label.textContent = isSpam ? 'رسالة مزعجة — Spam' : 'رسالة طبيعية — Ham';
      desc.textContent  = isSpam
        ? 'هذه الرسالة تبدو مزعجة أو غير مرغوب فيها.'
        : 'هذه الرسالة تبدو طبيعية وغير مزعجة.';

      barLabel.textContent = `نسبة الاحتمال: ${prob}%`;

      resultDiv.style.display = 'block';

      // Animate bar after display
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          barFill.style.width = prob + '%';
        });
      });
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    // Submit on Ctrl+Enter
    document.getElementById('msgInput').addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'Enter') checkMessage();
    });
  </script>
</body>
</html>
